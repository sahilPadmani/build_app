name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Configure
        run: cmake -B build -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Install NSIS
        run: choco install nsis -y
      - name: Package
        run: cd build && cpack -G NSIS -C Release
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: windows-x64
          path: build/*.exe

  windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Configure
        run: cmake -B build -A ARM64
      - name: Build
        run: cmake --build build --config Release
      - name: Install NSIS
        run: choco install nsis -y
      - name: Package
        run: cd build && cpack -G NSIS -C Release
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: windows-arm64
          path: build/*.exe

  windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Configure
        run: cmake -B build -A Win32
      - name: Build
        run: cmake --build build --config Release
      - name: Install NSIS
        run: choco install nsis -y
      - name: Package
        run: cd build && cpack -G NSIS -C Release
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: windows-x86
          path: build/*.exe

  ubuntu-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Package
        run: cd build && cpack -G DEB
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ubuntu-x64
          path: build/*.deb

  ubuntu-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Package
        run: cd build && cpack -G DEB
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ubuntu-arm64
          path: build/*.deb

  fedora-x64:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install deps
        run: dnf install -y cmake gcc-c++ make rpm-build
      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Package
        run: cd build && cpack -G RPM
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: fedora-x64
          path: build/*.rpm

  macos-arm64:
    runs-on: macos-latest           # Apple Silicon M1/M2/M3/M4
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build
      - name: Package
        run: cd build && cpack -G DragNDrop
      - name: Upload
        uses: actions/upload-artifact@v4.4.3
        with:
          name: macos-arm64
          path: build/*.dmg

  release:
    runs-on: ubuntu-latest
    needs:
      - windows-x64
      - windows-arm64
      - windows-x86
      - ubuntu-x64
      - ubuntu-arm64
      - fedora-x64
      - macos-arm64
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}